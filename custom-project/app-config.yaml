apiVersion: v1
kind: Service
metadata:
  name: nginxsvc
  namespace: test
spec:
  type: ClusterIP
  selector:
    app: nginxapp
  ports:
  - port: 80
    targetPort: 3000
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginxdeployment
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginxapp
  template:
    metadata:
      labels:
        app: nginxapp
    spec:
      containers:
      - name: nginxcontainer
        image: 691684280823.dkr.ecr.ap-south-1.amazonaws.com/argo-hotstar:36b35cd8aa104adebefbb8c49804d21726ea85be
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "150Mi"
          limits:
            cpu: "500m"
            memory: "700Mi"
